<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta name="description" content="Practice Box [PB] — a premium varsity practice web application for CSE, EEE and BBA students with MCQ and short-question practice modes." />
  <title>Practice Box [ PB ]</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Animated ambient background -->
  <div class="bg-aurora" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <div class="grid-overlay"></div>
  </div>

  <div class="app-shell">
    <!-- ================= HEADER ================= -->
    <header class="app-header glass">
      <div class="brand">
        <div class="pb-logo" aria-hidden="true">
          <span class="pb-logo__text">PB</span>
          <span class="pb-logo__ring"></span>
        </div>
        <div class="brand__title">
          <h1>Practice Box</h1>
          <span class="brand__tag">[ PB ]</span>
        </div>
      </div>

      <div class="controls">
        <div class="select-field">
          <label for="departmentSelect">Department</label>
          <div class="select-wrap">
            <select id="departmentSelect" class="glass-select">
              <option value="CSE">CSE</option>
              <option value="EEE">EEE</option>
              <option value="BBA">BBA</option>
            </select>
            <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
          </div>
        </div>

        <div class="select-field">
          <label for="semesterSelect">Semester</label>
          <div class="select-wrap">
            <select id="semesterSelect" class="glass-select">
              <option value="1">1st</option>
              <option value="2">2nd</option>
              <option value="3">3rd</option>
              <option value="4">4th</option>
              <option value="5">5th</option>
              <option value="6">6th</option>
              <option value="7">7th</option>
              <option value="8">8th</option>
            </select>
            <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
          </div>
        </div>

        <button
          id="themeToggle"
          class="theme-toggle"
          type="button"
          role="switch"
          aria-checked="true"
          aria-label="Toggle light and dark theme"
        >
          <span class="theme-toggle__track">
            <span class="theme-toggle__thumb">
              <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </span>
          </span>
        </button>
      </div>
    </header>

    <!-- ================= DASHBOARD ================= -->
    <section class="dashboard glass" aria-label="Session progress">
      <div class="dash-block">
        <span class="dash-label">Progress</span>
        <div class="progress-row">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-text" id="progressText">Question 0 of 0</span>
        </div>
      </div>

      <div class="dash-divider" aria-hidden="true"></div>

      <div class="dash-block dash-block--stats">
        <div class="stat">
          <span class="dash-label">Score</span>
          <span class="stat-value" id="scoreValue">0</span>
        </div>
        <div class="stat">
          <span class="dash-label">Type</span>
          <span class="stat-value stat-value--type" id="typeBadge">—</span>
        </div>
      </div>
    </section>

    <!-- ================= QUIZ ================= -->
    <main class="quiz glass" aria-live="polite">
      <!-- Loading state -->
      <div class="state-panel" id="loadingState">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading your practice set…</p>
      </div>

      <!-- Empty / error state -->
      <div class="state-panel state-panel--hidden" id="messageState">
        <div class="state-icon" aria-hidden="true">!</div>
        <p id="messageText">No questions found.</p>
        <button class="btn btn-ghost" id="retryBtn" type="button">Reload</button>
      </div>

      <!-- Active question -->
      <div class="question-view state-panel--hidden" id="questionView">
        <div class="q-meta">
          <span class="q-index" id="qIndexBadge">Q1</span>
          <span class="q-type-pill" id="qTypePill">MCQ</span>
        </div>

        <h2 class="q-text" id="questionText">Question text goes here.</h2>

        <!-- MCQ options -->
        <div class="options-grid" id="optionsGrid" hidden></div>

        <!-- Short question -->
        <div class="short-block" id="shortBlock" hidden>
          <textarea
            id="shortInput"
            class="short-input"
            rows="4"
            placeholder="Type your answer here to practice…"
          ></textarea>
          <button class="btn btn-primary btn-3d" id="showAnswerBtn" type="button">
            Show Answer
          </button>
          <div class="answer-reveal" id="answerReveal" hidden>
            <span class="answer-reveal__label">Correct Answer</span>
            <p class="answer-reveal__text" id="answerText"></p>
          </div>
        </div>

        <!-- Explanation banner (shared) -->
        <div class="explanation" id="explanationBanner" hidden>
          <span class="explanation__label">Explanation</span>
          <p id="explanationText"></p>
        </div>
      </div>
    </main>

    <!-- ================= NAVIGATION ================= -->
    <nav class="nav-bar glass" aria-label="Question navigation">
      <button class="btn btn-3d btn-nav" id="prevBtn" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
        <span>Previous</span>
      </button>

      <span class="nav-counter" id="navCounter">0 / 0</span>

      <button class="btn btn-3d btn-nav btn-nav--next" id="nextBtn" type="button" disabled>
        <span>Next</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6" /></svg>
      </button>
    </nav>

    <footer class="app-footer">
      <p>Practice Box <span>[ PB ]</span> · Crafted for focused varsity practice</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
